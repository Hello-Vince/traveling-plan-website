services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://mongodb:27017/japan-trip
      PORT: "3001"

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      API_TARGET: http://server:3001

volumes:
  mongo-data:
